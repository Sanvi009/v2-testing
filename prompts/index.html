  <!-- Combined JavaScript -->
  <script>
    // Global variables for search functionality
    let allPrompts = [];
    let currentSearch = '';
    let searchTimeout = null;
    let imageObserver = null;

    function extractTitle(filePath) {
      let fileName = filePath.split('/').pop().replace('.html', '');
      fileName = fileName.replace(/_/g, ' ');
      return fileName.replace(/\b\w/g, char => char.toUpperCase());
    }

    function performSearch(searchTerm, showAllResults = false) {
      if (!searchTerm.trim()) {
        displayPrompts(allPrompts);
        document.getElementById('searchInfo').classList.remove('show');
        document.getElementById('searchQuery').textContent = '';
        currentSearch = '';
        return;
      }
      const searchWords = searchTerm.toLowerCase().split(/\s+/).filter(word => word.length > 0);
      const results = allPrompts.filter(prompt => {
        const title = extractTitle(prompt.file_path);
        const searchableText = `
          ${prompt.description.toLowerCase()}
          ${title.toLowerCase()}
          ${prompt.keywords.toLowerCase()}
        `;
        return searchWords.some(word => searchableText.includes(word));
      });
      document.getElementById('searchQuery').textContent = searchTerm;
      document.getElementById('searchInfo').classList.add('show');
      currentSearch = searchTerm;
      if (showAllResults) {
        displayPrompts(results);
        document.getElementById('searchSuggestions').classList.remove('show');
      }
      return results;
    }

    function createSuggestions(results, searchTerm) {
      const suggestionsContainer = document.getElementById('searchSuggestions');
      suggestionsContainer.innerHTML = '';
      if (results.length === 0) {
        suggestionsContainer.innerHTML = '<div class="no-results">No prompts found</div>';
        suggestionsContainer.classList.add('show');
        return;
      }
      const topResults = results.slice(0, 5);
      topResults.forEach(prompt => {
        const suggestion = document.createElement('div');
        suggestion.className = 'suggestion-item';
        suggestion.dataset.id = prompt.id;
        const title = extractTitle(prompt.file_path);
        suggestion.innerHTML = `
          <img src="/images/${prompt.image}" 
               alt="${title}" 
               class="suggestion-image"
               width="40"
               height="40"
               loading="lazy"
               onerror="this.src='https://via.placeholder.com/40/f5f5f5/999?text=Prompt'">
          <div class="suggestion-info">
            <div class="suggestion-title">${title}</div>
            <div class="suggestion-desc">${prompt.description.substring(0, 80)}...</div>
          </div>
        `;
        suggestion.addEventListener('click', () => {
          window.location.href = prompt.file_path;
        });
        suggestionsContainer.appendChild(suggestion);
      });
      suggestionsContainer.classList.add('show');
    }

    function setupLazyLoading() {
      if (imageObserver) return;

      imageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
              img.classList.add('loaded');
            }
            imageObserver.unobserve(img);
          }
        });
      }, {
        rootMargin: '200px 0px',
        threshold: 0.01
      });
    }

    function displayPrompts(prompts) {
      const gridContainer = document.getElementById('promptsGrid');

      if (prompts.length === 0) {
        gridContainer.innerHTML = `
          <div class="error" style="display: block;">
            <i class="fas fa-search"></i> No prompts found. Try different keywords.
          </div>
        `;
        return;
      }

      gridContainer.innerHTML = '';
      setupLazyLoading();

      const immediateCount = Math.min(15, prompts.length);

      prompts.forEach((prompt, index) => {
        const card = document.createElement('a');
        card.href = prompt.file_path;
        card.className = 'prompt-card';

        const img = document.createElement('img');
        img.className = 'card-image';
        img.alt = extractTitle(prompt.file_path);
        img.width = 400;
        img.height = 400;

        if (index < immediateCount) {
          img.src = `/images/${prompt.image}`;
          img.fetchpriority = 'high';
          img.loading = 'eager';
        } else {
          img.dataset.src = `/images/${prompt.image}`;
          img.loading = 'lazy';
          img.fetchpriority = 'auto';
          imageObserver.observe(img);
        }

        img.onerror = function() {
          this.src = `https://via.placeholder.com/400/f5f5f5/999?text=Prompt+${prompt.id}`;
          this.classList.add('loaded');
        };

        img.onload = function() {
          this.classList.add('loaded');
        };

        card.appendChild(img);
        gridContainer.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      const errorElement = document.getElementById('error');
      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');
      const clearSearchBtn = document.getElementById('clearSearch');
      const suggestionsContainer = document.getElementById('searchSuggestions');

      async function loadPrompts() {
        try {
          const response = await fetch('/prompt.json');
          if (!response.ok) throw new Error('Failed to load prompts');
          allPrompts = await response.json();
          allPrompts = allPrompts.reverse();
          displayPrompts(allPrompts);
        } catch (error) {
          console.error('Error loading prompts:', error);
          errorElement.style.display = 'block';
        }
      }

      searchInput.addEventListener('input', function() {
        const searchTerm = this.value.trim();
        if (searchTimeout) clearTimeout(searchTimeout);
        if (!searchTerm) {
          suggestionsContainer.classList.remove('show');
          return;
        }
        searchTimeout = setTimeout(() => {
          const results = performSearch(searchTerm, false);
          createSuggestions(results, searchTerm);
        }, 300);
      });

      searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          const searchTerm = this.value.trim();
          if (searchTerm) {
            performSearch(searchTerm, true);
            suggestionsContainer.classList.remove('show');
          }
        }
      });

      searchButton.addEventListener('click', function() {
        const searchTerm = searchInput.value.trim();
        if (searchTerm) {
          performSearch(searchTerm, true);
          suggestionsContainer.classList.remove('show');
        }
      });

      clearSearchBtn.addEventListener('click', function() {
        searchInput.value = '';
        performSearch('', true);
        suggestionsContainer.classList.remove('show');
      });

      document.addEventListener('click', function(event) {
        if (!searchInput.contains(event.target) && !suggestionsContainer.contains(event.target) && !searchButton.contains(event.target)) {
          suggestionsContainer.classList.remove('show');
        }
      });

      loadPrompts();
    });

    // Mobile menu functionality
    (function() {
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const dropdown = document.getElementById('legalDropdown');

      if (menuToggle) {
        menuToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          navLinks.classList.toggle('show');
        });
      }

      const dropBtn = document.querySelector('#legalDropdown .dropbtn');
      if (dropBtn) {
        dropBtn.addEventListener('click', function(e) {
          if (window.innerWidth <= 800) {
            e.preventDefault();
            e.stopPropagation();
            dropdown.classList.toggle('active');
          }
        });
      }

      document.addEventListener('click', function(e) {
        if (window.innerWidth <= 800) {
          if (!menuToggle.contains(e.target) && !navLinks.contains(e.target)) {
            navLinks.classList.remove('show');
            dropdown.classList.remove('active');
          }
        }
      });

      if (navLinks) {
        navLinks.addEventListener('click', function(e) {
          e.stopPropagation();
        });
      }

      window.addEventListener('resize', function() {
        if (window.innerWidth > 800) {
          navLinks.classList.remove('show');
          dropdown.classList.remove('active');
        }
      });

      if (navLinks) {
        navLinks.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', function() {
            if (window.innerWidth <= 800) {
              navLinks.classList.remove('show');
            }
          });
        });
      }

      // Mobile footer injection
      function adjustMobileFooter() {
        const footerRight = document.querySelector('.footer-right');
        if (!footerRight) return;
        const isMobile = window.innerWidth <= 900;
        const existingNavBlock = document.querySelector('.mobile-nav-links');
        if (existingNavBlock) existingNavBlock.remove();

        if (isMobile) {
          const navLinksContainer = document.querySelector('.footer-left .footer-nav-links');
          if (navLinksContainer) {
            const links = navLinksContainer.querySelectorAll('a');
            if (links.length) {
              const mobileNavBlock = document.createElement('div');
              mobileNavBlock.className = 'mobile-nav-links';
              links.forEach(link => {
                const clone = link.cloneNode(true);
                clone.removeAttribute('style');
                mobileNavBlock.appendChild(clone);
              });
              footerRight.insertBefore(mobileNavBlock, footerRight.firstChild);
            }
          }
        }
      }

      window.addEventListener('resize', adjustMobileFooter);
      window.addEventListener('load', adjustMobileFooter);
      adjustMobileFooter();
    })();
  </script>
