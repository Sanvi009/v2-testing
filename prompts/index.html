        .dropdown:hover .dropbtn i {

            display: none;

        @media screen and (max-width: 700px) {

            .cards-grid {
                gap: 1.2rem;

    <!-- Combined JavaScript (original mobile menu + footer adjust + clean card generator) -->
    <script>
        (function() {
            // ----- ORIGINAL MOBILE MENU LOGIC (fully preserved) -----
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            const dropdown = document.getElementById('legalDropdown');

            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('show');
                });
            }

            const dropBtn = document.querySelector('#legalDropdown .dropbtn');
            if (dropBtn) {
                dropBtn.addEventListener('click', function(e) {
                    if (window.innerWidth <= 800) {
                        e.preventDefault();
                        e.stopPropagation();
                        dropdown.classList.toggle('active');
                    }
                });
            }

            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 800) {
                    if (!menuToggle.contains(e.target) && !navLinks.contains(e.target)) {
                        navLinks.classList.remove('show');
                        dropdown.classList.remove('active');
                    }
                }
            });

            if (navLinks) {
                navLinks.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth > 800) {
                    navLinks.classList.remove('show');
                    dropdown.classList.remove('active');
                }
            });

            if (navLinks) {
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', function() {
                        if (window.innerWidth <= 800) {
                            navLinks.classList.remove('show');
                        }
                    });
                });
            }

            // Mobile footer injection (preserved)
            function adjustMobileFooter() {
                const footerRight = document.querySelector('.footer-right');
                if (!footerRight) return;
                const isMobile = window.innerWidth <= 900;
                const existingNavBlock = document.querySelector('.mobile-nav-links');
                if (existingNavBlock) existingNavBlock.remove();

                if (isMobile) {
                    const navLinksContainer = document.querySelector('.footer-left .footer-nav-links');
                    if (navLinksContainer) {
                        const links = navLinksContainer.querySelectorAll('a');
                        if (links.length) {
                            const mobileNavBlock = document.createElement('div');
                            mobileNavBlock.className = 'mobile-nav-links';
                            links.forEach(link => {
